name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Log in to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/ci-cd-nodejs-demo:latest .

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/ci-cd-nodejs-demo:latest

  deploy:
    runs-on: [self-hosted, Linux, X64, test-action]
    needs: build-and-push
    steps:
      - name: Pull latest image
        run: docker pull ${{ secrets.DOCKER_USERNAME }}/ci-cd-nodejs-demo:latest

      - name: Stop old container
        run: docker stop ci-cd-app || true

      - name: Remove old container
        run: docker rm ci-cd-app || true

      - name: Run new container
        run: |
          docker run -d \
            --name ci-cd-app \
            --restart unless-stopped \
            -p 3000:3000 \
            ${{ secrets.DOCKER_USERNAME }}/ci-cd-nodejs-demo:latest
